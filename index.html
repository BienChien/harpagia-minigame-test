<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=0.70" />
  <title>Harpagia Helper</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cinzel+Decorative:wght@700&family=Manrope:wght@400;500;600;800;900&display=swap" rel="stylesheet">
  <style>
:root{
  --bg:#080c0c;
  --panel:#091010;
  --panel-2:#0e1816;
  --blue:#1585A8;
  --red:#E74C3C;
  --green:#27AE60;
  --text:#EAF2F8;

  --gap:14px;

  --results-min-h-grid: 360px;
  --results-min-h-sanctum: 340px;
  --history-min-h-sanctum: 240px;
  --results-min-h-diamond: 380px;
}

html,body{
  height:100%;
  overflow-x:hidden;
  color:var(--text);
  font-family: 'Manrope',"Segoe UI","Nunito","Trebuchet MS",system-ui,-apple-system,Roboto,Arial,sans-serif;
  letter-spacing:.2px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
body{
  background:
    radial-gradient(1200px 700px at 20% 0%, rgba(26,158,200,0.04), transparent 60%),
    radial-gradient(900px 600px at 90% 10%, rgba(26,158,200,0.05), transparent 55%),
    var(--bg);
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:18px;
  position:relative;
  overflow-x:hidden;
}
body::after{
  content:'';
  position:fixed;
  top:-120px; left:50%;
  transform:translateX(-50%);
  width:700px; height:400px;
  background:radial-gradient(ellipse, rgba(26,158,200,0.06) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

.app{
  width:min(1180px, 100%);
  display:grid;
  gap:16px;
  position:relative;
  z-index:1;
}

@keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(12px)}  to{opacity:1;transform:translateY(0)} }

.page-title{text-align:center;padding:20px 28px 0;margin-bottom:4px;background:radial-gradient(ellipse 70% 120% at 50% 60%,rgba(26,158,200,0.09),transparent 80%);animation:fadeDown 0.6s ease both;}
.page-title h1{font-family:'Cinzel',serif;font-size:clamp(22px,3.5vw,32px);font-weight:600;color:#cfe0ee;line-height:1.2;letter-spacing:0.06em;text-shadow:0 0 60px rgba(26,158,200,0.30),0 2px 4px rgba(0,0,0,0.6);}
.page-title-credit{font-size:12px;color:rgba(207,224,238,0.60);letter-spacing:0.04em;margin-top:7px;}
.page-title-rule{display:flex;align-items:center;gap:12px;margin-top:14px;color:rgba(26,158,200,0.4);font-size:16px;}
.page-title-rule::before,.page-title-rule::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(26,158,200,0.25),transparent);}

.topbar{
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none; /* inner box handles interactions */
  animation: fadeDown 0.5s ease both;
}

/* Opaque box so content doesn’t show through while scrolling */
.topbar-box{
  pointer-events: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 12px 14px;
  background: var(--panel);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px;
  box-shadow:
    0 12px 28px rgba(0,0,0,.35),
    inset 0 2px 0 rgba(255,255,255,.04);
  width: 100%;               /* match content width */
  max-width: 1180px;         /* align with .app */
}

/* Brand title */
.brand{
  font-family:'Cinzel',serif;
  font-weight:600;
  letter-spacing:.06em;
  font-size:20px;
  color:#cfe0ee;
  text-shadow:0 2px rgba(0,0,0,.25);
}

/* Segmented control (tabs) */
.segmented{
  display:inline-flex;
  flex-wrap:wrap;
  justify-content:center;
  background:var(--panel);
  border-radius:16px;
  padding:6px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.05), 0 12px 28px rgba(0,0,0,.25);
  gap:6px;
}
.topbar-box .segmented{
  /* Slight contrast inside the header box */
  background:var(--panel-2);
  box-shadow: inset 0 2px 0 rgba(255,255,255,.05), 0 10px 24px rgba(0,0,0,.25);
}
.seg-btn{
  border:none;
  border-radius:12px;
  padding:10px 16px;
  font-weight:900;
  letter-spacing:.3px;
  cursor:pointer;
  color:#cfe0ee;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  transition: background .15s ease, color .15s ease, box-shadow .15s ease, transform .08s ease;
}
.seg-btn:active{ transform: translateY(1px); }
.seg-btn.active{
  background:var(--blue);
  color:#041a16;
  border-color:transparent;
  box-shadow: 0 8px 20px rgba(21,133,168,.25);
}

/* SPA mount */
.view-container{
  position: relative;
  transition: min-height .25s ease;
}

/* Shared cards and typography */
.card{
  background:var(--panel);
  border-radius:18px;
  padding:18px;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.05),
    inset 0 -10px 20px rgba(0,0,0,.45),
    0 18px 40px rgba(0,0,0,.35);
  margin-bottom:12px;
  border-left:3px solid rgba(26,158,200,0.22);
  position:relative;
  animation: fadeUp 0.45s ease both;
}
.card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:1px;
  background:linear-gradient(to right, transparent, rgba(255,255,255,0.09), transparent);
  pointer-events:none;
}
.card:nth-child(1){ animation-delay:0.05s }
.card:nth-child(2){ animation-delay:0.10s }
.card:nth-child(3){ animation-delay:0.15s }
.card:nth-child(4){ animation-delay:0.20s }
.card:nth-child(5){ animation-delay:0.25s }
.title{
  font-family:'Cinzel',serif;
  font-weight:600;
  letter-spacing:.04em;
  text-align:center;
  font-size:26px;
  color:var(--text);
  text-shadow:0 2px rgba(0,0,0,.3);
}
.instructions{
  margin-top:10px;
  background:var(--panel-2);
  border-radius:14px;
  padding:14px 16px;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.04),
    inset 0 -8px 16px rgba(0,0,0,.45);
}
.instructions h3{
  margin:0 0 8px 0;
  font-size:15px;
  letter-spacing:.35px;
  color:#cfe0ee;
}
.instructions ul{
  margin:0;
  padding-left:18px;
  color:#b9c9d8;
  line-height:1.55;
  font-size:14px;
}
.panel-title{ font-weight:800; letter-spacing:.4px; color:#cfe0ee; }

/* Buttons */
.btn{
  appearance:none; border:none; border-radius:999px;
  padding:12px 20px; font-weight:800; letter-spacing:.3px; cursor:pointer;
  box-shadow: 0 10px 24px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.07);
  transition: transform .08s ease, filter .1s ease, box-shadow .15s ease, background .15s ease;
}
.btn:active{ transform: translateY(1px) scale(.99); filter:brightness(.98); }
.btn-primary{ background:var(--blue); color:#041a16; }
.btn-danger{ background:var(--red); color:#fff; }
.btn-ghost{ background:rgba(255,255,255,.06); color:#cfe0ee; border:1px solid rgba(255,255,255,.08); }

/* Small helpers */
.hint{
  text-align:center; color:#9eb6c8; font-size:13px; opacity:.9;
  margin-top:8px;
}
.badge{
  background:#0a2430;
  color:#8ed8e8;
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:4px 8px;
  font-weight:800;
  font-size:12px;
}

/* Footer */
.footer{
  margin-top:10px;
  text-align:center;
  color:#9eb6c8;
  font-size:12px;
}
.footer .links{
  display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-bottom:6px;
}
.footer .links a{
  text-decoration:none; color:#cfe0ee; background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08); padding:6px 10px; border-radius:10px; font-weight:800;
}
.footer .links a:hover{ filter:brightness(1.05); }

/* Placeholder */
.placeholder{
  display:grid; place-items:center;
  height:240px;
  background:var(--panel-2); border-radius:12px; color:#9eb6c8; font-style:italic;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -8px 16px rgba(0,0,0,.45);
}

/* Utilities */
.group{
  background:var(--panel-2);
  border-radius:12px;
  padding:12px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -8px 16px rgba(0,0,0,.45);
}
.mono{ font-family:"Courier New", ui-monospace, monospace; font-weight:800; letter-spacing:1px; }
.summary-row{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--panel-2); border-radius:14px; padding:12px 14px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -8px 16px rgba(0,0,0,.45);
  margin-bottom:14px;
}
.score{ font-size:28px; font-weight:900; color:#49D08C; text-shadow:0 2px rgba(0,0,0,.35); }

/* Inputs */
.input{
  background:var(--panel-2);
  border:1px solid rgba(255,255,255,.08);
  color:#cfe0ee;
  border-radius:10px;
  padding:8px 10px;
  min-width:120px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.05);
}
.input.small{ min-width:80px; width:120px; }
:root{
  --tile-radius:14px;
  --indicator-size:38px;
  --indicator-gap:10px;
}

.board-wrap{ position:relative; }
.board-clip{ overflow:hidden; }
.board{
  --tile:86px;
  display:grid;
  grid-template-columns: repeat(4, var(--tile));
  grid-template-rows: repeat(4, var(--tile));
  gap:var(--gap);
  width:fit-content;
  padding:22px;
  background:var(--panel-2);
  border-radius:16px;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.04),
    inset 0 -10px 20px rgba(0,0,0,.55),
    0 8px 28px rgba(0,0,0,.35);
}
.cell{
  width:var(--tile);
  height:var(--tile);
  border-radius:var(--tile-radius);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:28px;
  user-select:none; cursor:pointer;
  transition: transform .1s ease, box-shadow .15s ease, filter .15s ease;
  box-shadow:
    inset 0 3px 2px rgba(255,255,255,.12),
    inset 0 -8px 12px rgba(0,0,0,.45),
    0 4px 12px rgba(0,0,0,.4);
  border:1px solid rgba(0,0,0,.35);
}
.cell:active{ transform: translateY(1px) scale(.98); filter:brightness(.98); }
.v--1{ background:linear-gradient(180deg, rgba(255,255,255,.06), transparent) , #b83a2c; color:#fff; }
.v-0 { background:linear-gradient(180deg, rgba(255,255,255,.06), transparent) , #c49a0a; color:#222; text-shadow:0 1px rgba(0,0,0,.3); }
.v-1 { background:linear-gradient(180deg, rgba(255,255,255,.06), transparent) , #1e8a4a; color:#fff; }

.indicators{ position:absolute; inset:0; pointer-events:none; overflow:visible; }
.tap-indicator{
  position:absolute;
  width:var(--indicator-size); height:var(--indicator-size);
  line-height:var(--indicator-size); text-align:center;
  font-weight:900; color:#042838; background:#fff; border-radius:50%;
  box-shadow: 0 6px 0 #063040, 0 8px 22px rgba(0,0,0,.45);
  opacity:0; transition: opacity .15s ease;
}
.tap-indicator.show{ opacity:1; }

.results-grid{ min-height: var(--results-min-h-grid); }

.tap-groups{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.row{ display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px dashed rgba(255,255,255,.08); }
.row:last-child{ border-bottom:none; }

.sequence{ background:var(--panel-2); border-radius:12px; padding:12px; box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -8px 16px rgba(0,0,0,.45); max-height:260px; overflow:auto; }
.step{ display:flex; align-items:center; gap:10px; padding:6px 0; font-family:"Courier New",ui-monospace,monospace; }
.bubble{ width:24px; height:24px; border-radius:50%; display:grid; place-items:center; font-weight:900; font-size:12px; color:#042838; background:#fff; box-shadow:0 6px 0 #063040, 0 8px 22px rgba(0,0,0,.45); }
.layout-sanctum{
  display:grid; grid-template-columns: minmax(360px, 1fr) minmax(360px, 1fr); gap:16px; align-items:start;
}
@media (max-width: 860px){ .layout-sanctum{ grid-template-columns:1fr; } }

.slots-s{
  --slot-count: 4;
  display:grid;
  gap:var(--gap);
  justify-content:stretch;
  padding:16px;
  background:var(--panel-2);
  border-radius:16px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -10px 20px rgba(0,0,0,.55), 0 8px 28px rgba(0,0,0,.35);
  grid-template-columns: repeat(var(--slot-count, 4), minmax(0, 1fr));
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.slot-s{
  width:100%;
  height:auto;
  aspect-ratio: 1 / 1;
  border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:28px;
  box-shadow: inset 0 3px 2px rgba(255,255,255,.12), inset 0 -8px 12px rgba(0,0,0,.45), 0 4px 12px rgba(0,0,0,.4);
  border:1px solid rgba(0,0,0,.35);
  color:#fff; background:#112220;
  flex: 1 0 auto;
}
.slot-s.empty{ color:#9fb2c7; text-shadow:0 1px rgba(0,0,0,.4); }

.keypad-s{ display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; margin-top:14px; }
.digit-s{ height:52px; border-radius:14px; font-weight:900; font-size:18px; background:var(--blue); color:#041a16; border:none; cursor:pointer; box-shadow: 0 10px 24px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.07); }
.digit-s:disabled{ opacity:.35; cursor:not-allowed; }
.actions-s{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:12px; }
.steppers-s{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-top:12px; }
.stepper-s{ display:flex; gap:10px; align-items:center; background:var(--panel-2); border-radius:12px; padding:8px 10px; box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -6px 12px rgba(0,0,0,.4); }
.chip{ width:36px; height:36px; border-radius:50%; display:grid; place-items:center; background:#fff; color:#042838; font-weight:900; box-shadow: 0 6px 0 #063040, 0 8px 22px rgba(0,0,0,.45); }
.readonly-pill{ background:#0a2430; color:#8ed8e8; border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:4px 8px; font-weight:800; font-size:12px; }

.results-s{ min-height:var(--results-min-h-sanctum); }
.summary-s{ display:flex; justify-content:space-between; align-items:center; background:var(--panel-2); border-radius:12px; padding:12px 14px; box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -8px 16px rgba(0,0,0,.45); }
.count{ font-size:26px; font-weight:900; color:#49D08C; text-shadow:0 2px rgba(0,0,0,.35); }
.recommend{ margin-top:12px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; background:var(--panel-2); border-radius:12px; padding:12px; box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -8px 16px rgba(0,0,0,.45); }
.collapse{ margin-top:12px; background:var(--panel-2); border-radius:12px; padding:12px; box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -8px 16px rgba(0,0,0,.45); }
.collapse-header{ display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.collapse-body{ max-height:0; overflow:hidden; transition:max-height .25s ease; }
.collapse.open .collapse-body{ max-height:280px; }
.list{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.pill{ background:#0a2430; color:#8ed8e8; border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:4px 8px; font-weight:800; font-size:12px; }

.history-s{ min-height:var(--history-min-h-sanctum); }
.history-list{ max-height:260px; overflow:auto; background:var(--panel-2); border-radius:12px; padding:10px; box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -8px 16px rgba(0,0,0,.45); }
.attempt{ display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-bottom:1px dashed rgba(255,255,255,.08); }
.attempt:last-child{ border-bottom:none; }
.guess-badges{ display:flex; gap:6px; }
.layout-diamond{
  display:grid; grid-template-columns: minmax(360px, 1fr) minmax(360px, 1fr); gap:16px; align-items:start;
}
@media (max-width: 860px){ .layout-diamond{ grid-template-columns:1fr; } }

.results-diamond{ min-height:var(--results-min-h-diamond); }

.table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
.table th, .table td{
  border-bottom:1px dashed rgba(255,255,255,.08);
  padding:8px 6px;
  text-align:right;
}
.table th:first-child, .table td:first-child{ text-align:left; }
.table thead th{
  position:sticky; top:0;
  background:rgba(255,255,255,.04);
}

.num{ font-family:"Courier New", ui-monospace, monospace; }
.ok{ color:#49D08C; font-weight:800; }
.warn{ color:#F1C40F; font-weight:800; }
.danger{ color:#E74C3C; font-weight:800; }

.inline{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.field{ display:grid; gap:6px; align-items:center; }
.input{
  background:var(--panel-2);
  border:1px solid rgba(255,255,255,.08);
  color:#cfe0ee;
  border-radius:10px;
  padding:8px 10px;
  min-width:120px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.05);
}
.input.small{ min-width:80px; width:120px; }
/* assets/css/zen.css */
.layout-zen{
  display:grid;
  grid-template-columns: minmax(360px, 1fr) minmax(360px, 1fr);
  gap:16px;
  align-items:start;
}
@media (max-width: 860px){ .layout-zen{ grid-template-columns:1fr; } }

.layout-zen > .card:first-child{
  position: sticky;
  top: 16px;
  align-self: start;
  z-index: 50;
}

.controls-zen{ display:grid; gap:12px; }
.row-zen{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

.select-zen{
  appearance:none;
  background:var(--panel-2);
  border:1px solid rgba(255,255,255,.08);
  color:#cfe0ee;
  border-radius:10px;
  padding:10px 12px;
  min-width: 180px;
  box-shadow: inset 0 2px 0 rgba(255,255,255,.05);
}

/* Status grid — small labels, larger values */
.status-zen{
  display:grid; grid-template-columns:repeat(3, 1fr);
  gap:8px; margin-top:8px;
  font-family:"Courier New", ui-monospace, monospace;
  font-variant-numeric: tabular-nums;
  line-height:1.2;
}
.status-zen .cell{
  font-size:10px;
  padding:5px 6px;
  background:var(--panel-2);
  border:1px solid rgba(255,255,255,.08);
  border-radius:8px;
  color:#9eb6c8;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.status-zen .cell strong{
  font-size:16px;
  font-weight:900;
  color:var(--text);
  margin-left:4px;
  vertical-align:baseline;
}
@media (max-width:520px){
  .status-zen{ grid-template-columns:repeat(2,1fr); }
  .status-zen .cell strong{ font-size:14px; }
}

/* Preview */
.preview-zen{ position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:var(--panel-2); border-radius:12px; }
.preview-zen video{
  max-width:100%; max-height:100%;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
  background:#000;
}
.preview-zen canvas.overlay{
  position:absolute; z-index:3; touch-action:none; user-select:none; -webkit-user-select:none;
}
.overlay.pe-none{ pointer-events:none; }
.overlay.pe-auto{ pointer-events:auto; cursor:crosshair; }

/* Floating labels */
.guideHeader{
  position:absolute; left:12px; top:12px; padding:6px 10px; border-radius:10px;
  background:rgba(8,20,22,0.65);
  border:1px solid rgba(100,210,220,0.35);
  backdrop-filter: blur(4px);
  font-weight:800; letter-spacing:.3px; color:#c8eaf0; z-index:4; pointer-events:none;
}

/* Legend — simplified to Current/Next */
.legend-zen{
  display:flex; gap:10px; flex-wrap:wrap; margin-top:6px;
  color:#9eb6c8; font-size:12px;
}
.legend-zen span{ display:inline-flex; align-items:center; gap:6px; }
.legend-zen .green{ width:10px; height:10px; background:#22c55e; border-radius:2px; }
.legend-zen .magenta{ width:10px; height:10px; background:#ff00ff; border-radius:2px; }

/* <details> styling */
.details-zen{
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  padding:8px 10px;
  background:var(--panel-2);
  box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -6px 12px rgba(0,0,0,.4);
}
.details-zen > summary{
  cursor:pointer; list-style:none; color:#cfe0ee; font-weight:800;
}
.details-zen[open]{ border-color: rgba(255,255,255,.18); }

// === shared/format ===

// js/shared/format.js
function formatNumber(n){
  if(n==null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if(abs >= 1e12) return (n/1e12).toFixed(3).replace(/\.?0+$/,'')+'T';
  if(abs >= 1e9)  return (n/1e9).toFixed(3).replace(/\.?0+$/,'')+'B';
  if(abs >= 1e6)  return (n/1e6).toFixed(3).replace(/\.?0+$/,'')+'M';
  if(abs >= 1e3)  return (n/1e3).toFixed(3).replace(/\.?0+$/,'')+'k';
  return String(n);
}
function formatPercent(p, decimals=2){
  if(p==null || isNaN(p)) return '—';
  return (p*100).toFixed(decimals)+'%';
}

// === diamond/scale ===

// js/diamond/scale.js
function scalePayout(P100M, D, k, wager) {
  // P100M[D][k-1] holds the 100M payout for rung k
  const ladder = P100M?.[D];
  if (!ladder || ladder[k - 1] == null) return null;
  const base = ladder[k - 1]; // at 100,000,000 coins
  return Math.round(base * (wager / 100_000_000));
}

// === diamond/payouts ===

// js/diamond/payouts-100m.js
// CSV format (clean): first row is header "1,2,...,24".
// Each following row k (1-based) has 24 comma-separated columns; blanks for D<k.
// We map non-empty cells to P100M[D][k-1].

const TRIANGLE_100M_CSV = `

function parseCSVTriangle(text) {
  const raw = (text || '').split(/\r?\n/).map(l => l.trimEnd());
  // Keep only lines that contain any digit
  const withDigits = raw.filter(l => /\d/.test(l));
  if (withDigits.length === 0) return {};

  // Detect and drop the header "1,2,...,24"
  const headerTokens = (withDigits[0] || '').split(',');
  const isHeader = headerTokens.length >= 24 && headerTokens.slice(0,24).every((t, i) => t.trim() === String(i+1));
  const dataLines = isHeader ? withDigits.slice(1) : withDigits;

  const table = {};
  let kIndex = 0; // 0-based index for k
  for (const line of dataLines) {
    if (kIndex >= 24) break;
    const tokens = line.split(',');
    // Ensure exactly 24 columns (pad or trim)
    const cols = Array.from({ length: 24 }, (_, i) => (tokens[i] ?? '').trim());
    for (let D = 1; D <= 24; D++) {
      const t = cols[D - 1];
      if (t === '') continue;               // blank cell = no value for this D at this k
      const val = parseInt(t, 10);
      if (!Number.isFinite(val)) continue;  // guard against bad cells
      if (!table[D]) table[D] = [];
      table[D][kIndex] = val;               // store at k-1 (kIndex)
    }
    kIndex++;
  }
  return table;
}

// Build dense P100M: for each D=1..24, create an array of length D with all k filled (null if missing)
const P100M = (() => {
  const sparse = parseCSVTriangle(TRIANGLE_100M_CSV);
  const dense = {};
  for (let D = 1; D <= 24; D++) {
    const src = sparse[D] || [];
    dense[D] = Array.from({ length: D }, (_, i) => {
      const v = src[i];
      return Number.isFinite(v) ? v : null;
    });
  }

  // Quick sanity: log first rung k=1 across D
  try {
    const k1s = Array.from({ length: 24 }, (_, i) => dense[i + 1]?.[0]);
    console.debug('Diamond P100M sanity k=1 for D=1..24:', k1s);
  } catch {}

  return dense;
})();

// === diamond/ev ===

// js/diamond/ev.js
function computeEV(P100M, D, wager) {
  const ladder = P100M?.[D];

  // Strong validation: ensure every rung k=1..D exists and is finite
  if (!ladder) {
    return { ok: false, reason: `Missing payout ladder for D=${D} in the preloaded table.` };
  }
  for (let k = 1; k <= D; k++) {
    if (!Number.isFinite(ladder[k - 1])) {
      return { ok: false, reason: `Missing payout ladder value for D=${D}, k=${k}.` };
    }
  }

  const N = 25; // 5x5 board
  const P = []; // scaled payouts at this wager, 1..D
  for (let k = 1; k <= D; k++) {
    const v = scalePayout(P100M, D, k, wager);
    if (v == null) {
      return { ok: false, reason: `Missing payout ladder entry after scaling for D=${D}, k=${k}.` };
    }
    P[k] = v;
  }

  // DP for optimal stopping
  const V = [];
  V[D] = P[D];
  for (let k = D - 1; k >= 0; k--) {
    const p = (D - k) / (N - k);
    const cont = p * V[k + 1];
    const cash = k === 0 ? 0 : P[k];
    V[k] = Math.max(cash, cont);
  }

  // Threshold: first k with cash >= cont; else D
  let threshold = D;
  for (let k = 0; k < D; k++) {
    const p = (D - k) / (N - k);
    const cont = p * V[k + 1];
    const cash = (k === 0 ? 0 : P[k]);
    if (cash >= cont) { threshold = k; break; }
  }

  // Rows for the table
  const rows = [];
  for (let k = 0; k <= D; k++) {
    const p = (k === D) ? null : (D - k) / (N - k);
    const payout = (k === 0) ? 0 : P[k];
    const contEV = (k === D) ? null : p * V[k + 1];
    const decision = (k === D) ? '—' : ((payout >= contEV) ? 'Cash out' : 'Continue');
    rows.push({ k, payout, p, contEV, decision });
  }

  // Reach/bust probabilities
  let reachProb = 1;
  for (let t = 0; t < threshold; t++) reachProb *= (D - t) / (N - t);
  const bustProb = 1 - reachProb;

  return {
    ok: true,
    V0: V[0],
    ticketsPerCoin: V[0] / wager,
    threshold,
    rows,
    reachProb,
    bustProb
  };
}

// === grid/solver ===

// js/grid/solver.js
const CYCLE = [-1, 1, 0];

function cycleValue(value, taps){
  const idx = CYCLE.indexOf(value);
  return CYCLE[(idx + taps) % 3];
}
function applyRowTaps(src, rowTaps){
  return src.map((row,i)=> row.map(cell => cycleValue(cell, rowTaps[i])));
}
function columnSumAfterTaps(g, colIdx, taps){
  return g.reduce((sum,row)=> sum + cycleValue(row[colIdx], taps), 0);
}

function optimizeTaps(grid){
  let bestSum = -Infinity;
  let bestRowTaps = null, bestColTaps = null;
  for(let r0=0;r0<3;r0++){
    for(let r1=0;r1<3;r1++){
      for(let r2=0;r2<3;r2++){
        for(let r3=0;r3<3;r3++){
          const rowTaps = [r0,r1,r2,r3];
          const afterRows = applyRowTaps(grid, rowTaps);
          let total=0; const colTaps=[];
          for(let j=0;j<4;j++){
            let bestCol=-Infinity, bestK=0;
            for(let k=0;k<3;k++){
              const s = columnSumAfterTaps(afterRows, j, k);
              if(s>bestCol){ bestCol=s; bestK=k; }
            }
            colTaps.push(bestK); total+=bestCol;
          }
          if(total > bestSum){
            bestSum=total; bestRowTaps=rowTaps; bestColTaps=colTaps;
          }
        }
      }
    }
  }
  return { bestSum, bestRowTaps, bestColTaps };
}

// === grid/view ===

// js/grid/index.js
let grid = null;
let indicatorsEl = null;
let lastRowTaps = [0,0,0,0];
let lastColTaps = [0,0,0,0];

function updateTileSize(){
  const clip = document.querySelector('.board-clip');
  const board = document.getElementById('gridBoard');
  if(!clip || !board) return;
  const available = clip.clientWidth - 44; // 22px padding each side
  const tile = Math.min(86, Math.floor((available - 42) / 4)); // 42 = 3 gaps × 14px
  board.style.setProperty('--tile', tile + 'px');
}

function classFor(v){ return v===-1?'v--1':(v===0?'v-0':'v-1'); }
function nextValue(value){ const CYCLE = [-1,1,0]; return CYCLE[(CYCLE.indexOf(value)+1)%3]; }

function renderBoard(boardEl){
  boardEl.innerHTML='';
  indicatorsEl.innerHTML='';
  for(let i=0;i<4;i++){
    for(let j=0;j<4;j++){
      const cell=document.createElement('div');
      cell.className = 'cell ' + classFor(grid[i][j]);
      cell.dataset.row=i; cell.dataset.col=j;
      cell.textContent = grid[i][j]===1?'+1':String(grid[i][j]);
      cell.addEventListener('click', ()=> onCellClick(i,j,cell));
      boardEl.appendChild(cell);
    }
  }
  for(let i=0;i<4;i++){
    const r=document.createElement('div');
    r.className='tap-indicator'; r.id=`g-row-${i}`;
    indicatorsEl.appendChild(r);
  }
  for(let j=0;j<4;j++){
    const c=document.createElement('div');
    c.className='tap-indicator'; c.id=`g-col-${j}`;
    indicatorsEl.appendChild(c);
  }
  requestAnimationFrame(()=> updateIndicators(lastRowTaps,lastColTaps));
}

function onCellClick(i,j,cell){
  grid[i][j] = nextValue(grid[i][j]);
  cell.className = 'cell ' + classFor(grid[i][j]);
  cell.textContent = grid[i][j]===1?'+1':String(grid[i][j]);
  showGridPlaceholder();
  lastRowTaps=[0,0,0,0]; lastColTaps=[0,0,0,0];
  requestAnimationFrame(()=> updateIndicators(lastRowTaps,lastColTaps));
}

function clearIndicators(){
  for(let i=0;i<4;i++){ const r=document.getElementById(`g-row-${i}`); if(r){ r.classList.remove('show'); r.textContent=''; } }
  for(let j=0;j<4;j++){ const c=document.getElementById(`g-col-${j}`); if(c){ c.classList.remove('show'); c.textContent=''; } }
}
function updateIndicators(rowTaps, colTaps){
  const size = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--indicator-size')) || 38;
  const gap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--indicator-gap')) || 10;
  const overlayRect = indicatorsEl.getBoundingClientRect();

  for(let i=0;i<4;i++){
    const leftCell = document.querySelector(`.cell[data-row="${i}"][data-col="0"]`);
    if(!leftCell) continue;
    const rect = leftCell.getBoundingClientRect();
    const ind = document.getElementById(`g-row-${i}`);
    const top = rect.top - overlayRect.top + (rect.height - size)/2;
    const left = rect.left - overlayRect.left - size - gap;
    ind.style.top = `${top}px`; ind.style.left = `${left}px`;
    if(rowTaps[i]>0){ ind.textContent = rowTaps[i]; ind.classList.add('show'); } else { ind.classList.remove('show'); ind.textContent=''; }
  }
  for(let j=0;j<4;j++){
    const topCell = document.querySelector(`.cell[data-row="0"][data-col="${j}"]`);
    if(!topCell) continue;
    const rect = topCell.getBoundingClientRect();
    const ind = document.getElementById(`g-col-${j}`);
    const top = rect.top - overlayRect.top - size - gap;
    const left = rect.left - overlayRect.left + (rect.width - size)/2;
    ind.style.top = `${top}px`; ind.style.left = `${left}px`;
    if(colTaps[j]>0){ ind.textContent=colTaps[j]; ind.classList.add('show'); } else { ind.classList.remove('show'); ind.textContent=''; }
  }
}

function showGridPlaceholder(){
  const shell = document.getElementById('gridResultsShell');
  shell.innerHTML = `<div class="placeholder" style="height:calc(var(--results-min-h-grid) - 10px);">Solution cleared — press Solve</div>`;
}

function rowLine(label,count){
  const d=document.createElement('div'); d.className='row';

function stepLine(n,text){

function renderGridResults(bestSum, rowTaps, colTaps, sequence){
  const resultsShell = document.getElementById('gridResultsShell');
  const wrap = document.createElement('div');
  const totalTaps = rowTaps.reduce((a,b)=>a+b,0) + colTaps.reduce((a,b)=>a+b,0);
  wrap.innerHTML = `
    <div class="summary-row">
      <div>
        <div class="score" id="gMaxScore">${bestSum}</div>

      </div>

      </div>
    </div>
    <div class="group">
      <h3>Step-by-Step Sequence</h3>
      <div class="sequence" id="gSeq"></div>
    </div>
  `;
  resultsShell.innerHTML=''; resultsShell.appendChild(wrap);

  const rowsEl = wrap.querySelector('#gRows');
  const colsEl = wrap.querySelector('#gCols');
  let anyRow=false, anyCol=false;
  rowTaps.forEach((t,i)=>{ if(t>0){ anyRow=true; rowsEl.appendChild(rowLine(`Row ${i+1}`, t)); } });
  colTaps.forEach((t,j)=>{ if(t>0){ anyCol=true; colsEl.appendChild(rowLine(`Column ${j+1}`, t)); } });
  if(!anyRow) rowsEl.appendChild(rowLine('No row taps needed','0'));
  if(!anyCol) colsEl.appendChild(rowLine('No column taps needed','0'));

  const seqEl = wrap.querySelector('#gSeq');
  if(sequence.length===0){
    const no=document.createElement('div'); no.style.color='#9eb6c8'; no.style.fontStyle='italic'; no.textContent='No taps needed. Grid already optimal.'; seqEl.appendChild(no);
  }else{
    sequence.forEach((s,idx)=> seqEl.appendChild(stepLine(idx+1, s)));
  }

  lastRowTaps=[...rowTaps]; lastColTaps=[...colTaps];
  requestAnimationFrame(()=> updateIndicators(lastRowTaps,lastColTaps));
}

    showGridPlaceholder();
    lastRowTaps=[0,0,0,0]; lastColTaps=[0,0,0,0];
    requestAnimationFrame(()=> updateIndicators(lastRowTaps,lastColTaps));
  });

  window.addEventListener('resize', onResize);
}

function gridDestroy(){
  window.removeEventListener('resize', onResize);
}

function onResize(){
  clearTimeout(window.__grid_resize);
  window.__grid_resize = setTimeout(()=> requestAnimationFrame(()=>{
    updateTileSize();
    updateIndicators(lastRowTaps,lastColTaps);
  }), 120);
}

// js/sanctum/solver.js
function digitsForMax(maxDigit){
  const arr=[]; for(let d=0; d<=maxDigit; d++) arr.push(d);
  return arr;
}
function permutations(arr){
  const res=[]; const used=new Array(arr.length).fill(false); const cur=[];
  function backtrack(){
    if(cur.length===arr.length){ res.push(cur.slice()); return; }
    for(let i=0;i<arr.length;i++){
      if(used[i]) continue; used[i]=true; cur.push(arr[i]); backtrack(); cur.pop(); used[i]=false;
    }
  }
  backtrack(); return res;
}
function countPositionalMatches(candidate, guess){
  let m=0; for(let i=0;i<candidate.length;i++){ if(candidate[i]===guess[i]) m++; } return m;
}

/* ===== Logic and rendering ===== */

function onDifficultyChange() {
  state.difficulty = sDifficulty.value;
  resetSession(false);
}

function resetSession(keepDifficulty=true) {
  if (!keepDifficulty) state.difficulty = sDifficulty.value;
  const maxDigit = difficultyMap[state.difficulty].max;
  state.digits = digitsForMax(maxDigit);
  state.length = state.digits.length;
  state.guess = [];
  state.right = 0;
  state.history = [];
  state.candidates = permutations(state.digits);

  sLengthInfo.textContent = `Length: ${state.length}`;
  renderSlots();
  renderKeypad();
  renderHistory();
  renderResultsPlaceholder();
  clampRight();
  validateConfirm();
}

function applyResponsiveGrid(){
  sSlots.style.setProperty('--slot-count', state.length);
  sSlots.style.gridTemplateColumns = `repeat(${state.length}, minmax(0, 1fr))`;
}

function renderSlots(){
  sSlots.innerHTML = '';
  applyResponsiveGrid();
  for (let i=0; i<state.length; i++){
    const div = document.createElement('div');
    div.className = 'slot-s' + (state.guess[i]==null ? ' empty' : '');
    div.textContent = state.guess[i]==null ? '-' : String(state.guess[i]);
    sSlots.appendChild(div);
  }
}

function renderKeypad(){
  sKeypad.innerHTML = '';
  const allowed = new Set(state.digits);
  for (let d=0; d<=9; d++){
    const btn = document.createElement('button');
    btn.className = 'digit-s';
    btn.textContent = d;
    btn.disabled = !allowed.has(d);
    btn.addEventListener('click', ()=> addDigit(d));
    sKeypad.appendChild(btn);
  }
}

function renderHistory(){
  sHistoryList.innerHTML = '';
  if (state.history.length === 0){
    const ph = document.createElement('div');
    ph.className = 'placeholder';
    ph.style.height = 'calc(var(--history-min-h-sanctum) - 10px)';
    ph.textContent = 'No attempts yet — enter a full guess, set Right, then Confirm.';
    sHistoryList.appendChild(ph);
    return;
  }
  for (const h of state.history){
    const row = document.createElement('div'); row.className = 'attempt';
    const left = document.createElement('div'); left.className = 'guess-badges mono'; left.textContent = h.guess.join('');

    const b2 = document.createElement('span'); b2.className = 'badge'; b2.textContent = `Wrong: ${h.wrong}`;

function renderResultsPlaceholder(){
  sResultsShell.innerHTML = `<div class="placeholder" style="height:calc(var(--results-min-h-sanctum) - 10px);">Solution area — press Confirm after entering a full guess and Right count.</div>`;
}

function renderResults(){
  const count = state.candidates.length;
  const recommended = count>0 ? state.candidates[0] : null;
  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <div class="summary-s">
      <div class="panel-title">Remaining Possibilities</div>

    </div>

        <div class="panel-title">Recommended Next Guess</div>

    </div>
    <div class="collapse" id="sCollapse">
      <div class="collapse-header">
        <div class="panel-title">View All Remaining</div>
        <button id="sToggle" class="btn btn-ghost" aria-expanded="false">Expand</button>
      </div>
      <div class="collapse-body"><div class="list" id="sList"></div></div>
    </div>
  `;
  sResultsShell.innerHTML=''; sResultsShell.appendChild(wrap);

  const list = wrap.querySelector('#sList');
  if(count===0){
    const itm=document.createElement('div'); itm.className='pill'; itm.textContent='No candidates remain — check Right feedback or difficulty.'; list.appendChild(itm);
  } else {
    const limit=400; const upto=Math.min(count, limit);
    for(let i=0;i<upto;i++){ const p=document.createElement('span'); p.className='pill mono'; p.textContent=state.candidates[i].join(''); list.appendChild(p); }
    if(count>limit){ const extra=document.createElement('span'); extra.className='pill'; extra.textContent=`+${count-limit} more…`; list.appendChild(extra); }
  }

  const box = wrap.querySelector('#sCollapse');
  const toggle = wrap.querySelector('#sToggle');
  toggle.addEventListener('click', ()=>{
    const open = box.classList.toggle('open');
    toggle.textContent = open ? 'Collapse' : 'Expand';
    toggle.setAttribute('aria-expanded', String(open));
  });

  const useBtn = wrap.querySelector('#sUseRec');
  if(useBtn && recommended){
    useBtn.addEventListener('click', ()=>{
      state.guess = recommended.slice();
      renderSlots();
      validateConfirm();
    });
  }
}

/* ===== Interactions ===== */

function addDigit(d){
  if(state.guess.includes(d)) return;
  if(state.guess.length >= state.length) return;
  state.guess.push(d); renderSlots(); validateConfirm();
}
function deleteDigit(){ state.guess.pop(); renderSlots(); validateConfirm(); }
function clearGuess(){ state.guess=[]; renderSlots(); validateConfirm(); }

function clampRight(){
  state.right = Math.max(0, Math.min(state.right, state.length));
  sRightChip.textContent = String(state.right);
  sWrongDisplay.textContent = String(state.length - state.right);
  validateConfirm();
}

function validateConfirm(){
  sConfirm.disabled = !(state.guess.length===state.length && state.right>=0 && state.right<=state.length);
}

function doConfirm(){
  if(sConfirm.disabled) return;
  const wrong = state.length - state.right;
  state.history.push({ guess: state.guess.slice(), right: state.right, wrong });

  // Filter candidates by positional matches
  state.candidates = state.candidates.filter(c => countPositionalMatches(c, state.guess) === state.right);

  renderHistory();
  renderResults();

  state.guess=[]; state.right=0;
  clampRight(); renderSlots(); validateConfirm();
}

/* ========== Helpers ========== */

function clampWager(n){ 
  // clamp and round to nearest 1000 only when computing, not while typing
  const x = Math.max(MIN_BET, Math.min(MAX_BET, Number(n || 0)));
  return Math.round(x / 1000) * 1000;
}
function clampD(n){ return Math.max(1, Math.min(24, Math.round(Number(n||0)))); }

function bind() {
  const wEl = document.getElementById('dWager');
  const dEl = document.getElementById('dDiamonds');
  const bEl = document.getElementById('dBankroll');

  document.getElementById('dRecalc').addEventListener('click', recalc);
  document.getElementById('dBestOverall').addEventListener('click', applyBestOverall);
  document.getElementById('dApplyBestBankroll').addEventListener('click', applyBestForBankroll);

  // Mark “custom” if user edits wager/diamonds, hide bankroll suggestions
  ['change', 'input', 'blur'].forEach(evt => {
    wEl.addEventListener(evt, ()=> { userChangedWD = true; recalc(); });
    dEl.addEventListener(evt, ()=> { userChangedWD = true; recalc(); });
  });

  ['change', 'blur'].forEach(evt => {
    bEl.addEventListener(evt, recalc);
  });

  // Delegate clicks for dynamically-rendered per-preset “Apply” buttons
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-apply-d][data-apply-w]');
    if (!btn) return;
    const D = parseInt(btn.getAttribute('data-apply-d'), 10);
    const w = parseInt(btn.getAttribute('data-apply-w'), 10);
    if (Number.isFinite(D) && Number.isFinite(w)) {
      applySelection(D, w);
    }
  });
}

function applySelection(D, wager){
  const wEl = document.getElementById('dWager');
  const dEl = document.getElementById('dDiamonds');
  const W = clampWager(wager);
  const DD = clampD(D);
  // Show formatted values in the inputs
  wEl.value = withCommas(W);
  dEl.value = DD;
  // Applying a suggestion counts as “custom” thereafter
  userChangedWD = true;
  recalc();
}

// Argmax over D for tickets-per-coin (independent of wager due to linear scaling)
function computeBestD() {
  let best = { D: 1, tpc: -Infinity, res: null };
  for (let D = 1; D <= 24; D++) {
    const r = computeEV(P100M, D, MAX_BET);
    if (!r.ok) continue;
    if (r.ticketsPerCoin > best.tpc) best = { D, tpc: r.ticketsPerCoin, res: r };
  }
  return best;
}

function applyBestOverall(){
  const best = computeBestD();
  if (!best.res) return;
  applySelection(best.D, MAX_BET);
}

// Applies D* and a bankroll-based wager (Balanced 0.5% by default)
function applyBestForBankroll(){
  const bankroll = toNumber(document.getElementById('dBankroll').value);
  if (!bankroll || bankroll <= 0) return;
  const best = computeBestD();
  if (!best.res) return;

  let suggested = Math.floor((bankroll * DEFAULT_BANKROLL_FRACTION) / 1000) * 1000;
  suggested = Math.max(MIN_BET, Math.min(MAX_BET, suggested));
  applySelection(best.D, suggested);
}

/* ========== Rendering ========== */

function recalc() {
  const wagerEl = document.getElementById('dWager');
  const diamondsEl = document.getElementById('dDiamonds');
  const bankrollEl = document.getElementById('dBankroll');
  const resultsEl = document.getElementById('dResults');
  const bestEl = document.getElementById('dBestForBankroll');
  const btnApplyBest = document.getElementById('dApplyBestBankroll');

  // Parse numbers from (possibly) comma-formatted inputs
  const wagerRaw = toNumber(wagerEl.value);
  const bankrollRaw = toNumber(bankrollEl.value);

  const wager = clampWager(wagerRaw);
  const D = clampD(diamondsEl.value);

  // Re-display inputs with commas (and clamped wager)
  wagerEl.value = withCommas(wager);
  if (bankrollEl.value !== '') {
    bankrollEl.value = bankrollRaw ? withCommas(bankrollRaw) : '';
  }
  diamondsEl.value = D;

  // Enable/disable “Apply best for your bankroll”
  btnApplyBest.disabled = !(bankrollRaw > 0);

  // Always render the custom table for current Wager + D
  const res = computeEV(P100M, D, wager);
  if (!res.ok) {
    resultsEl.innerHTML = `<div class="placeholder" style="height:calc(var(--results-min-h-diamond) - 10px);">${res.reason}</div>`;
  } else {
    renderResultsTable(resultsEl, res, D, wager);
  }

  // Show “Best EV for your bankroll” only if bankroll is provided AND user hasn’t entered custom W/D after that
  if (bankrollRaw > 0 && !userChangedWD) {
    renderBestForBankroll(bestEl, bankrollRaw);
  } else if (bankrollRaw > 0 && userChangedWD) {
    bestEl.innerHTML = `
      <div class="group">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div style="color:#9eb6c8; font-size:13px;">
            You entered a custom wager/diamonds, so bankroll suggestions are hidden.
          </div>
          <button class="btn btn-ghost" id="dShowBankrollAgain">Show bankroll suggestions again</button>
        </div>
      </div>
    `;
    const backBtn = document.getElementById('dShowBankrollAgain');
    backBtn?.addEventListener('click', ()=> { userChangedWD = false; recalc(); });
  } else {
    bestEl.innerHTML = `<div style="color:#9eb6c8; font-size:13px;">Enter your bankroll to see optimal Diamonds and suggested bet sizes.</div>`;
  }
}

function renderResultsTable(container, res, D, wager){
  const kstar = res.threshold;
  const evTickets = Math.round(res.V0);
  const tpc = res.ticketsPerCoin;

  const strategy =
    (kstar === 0) ? `Cash out immediately (k = 0).` :
    (kstar === D) ? `Continue while successful and cash out at full clear (k = ${D}).` :
    `Continue until you have ${kstar} diamonds, then cash out at or before k = ${kstar}.`;

  let html = `
    <div class="summary-s" style="margin-bottom:12px;">
      <div>
        <div class="panel-title">EV at start</div>
        <div class="num" style="font-size:24px; font-weight:900;">${evTickets.toLocaleString()}</div>
        <div style="font-size:12px; color:#b9c9d8;">${(tpc*100).toFixed(2)} tickets per 100 coins</div>
      </div>
      <div>
        <div class="panel-title">Recommended Strategy</div>
        <div style="max-width:520px;">${strategy}</div>
        <div style="margin-top:6px; font-size:12px; color:#b9c9d8;">
          Reach threshold: ${formatPercent(res.reachProb)} • Bust probability: ${formatPercent(res.bustProb)}
        </div>
      </div>
    </div>
    <div style="max-height:320px; overflow:auto; border-radius:12px; box-shadow: inset 0 2px 0 rgba(255,255,255,.04), inset 0 -8px 16px rgba(0,0,0,.45); background:var(--panel-2);">
      <table class="table">
        <thead>
          <tr>
            <th>k successes so far</th>
            <th>Payout @ wager</th>
            <th>p(next success)</th>
            <th>Continue EV</th>
            <th>Decision</th>
          </tr>
        </thead>
        <tbody>
  `;
  for (const r of res.rows) {
    const hl = (r.decision === 'Cash out') ? 'warn' : (r.decision === '—' ? '' : 'ok');
    html += `
      <tr>
        <td class="num">${r.k}</td>
        <td class="num">${r.payout == null ? '—' : r.payout.toLocaleString()}</td>
        <td class="num">${r.p == null ? '—' : (r.p*100).toFixed(2) + '%'}</td>
        <td class="num">${r.contEV == null ? '—' : Math.round(r.contEV).toLocaleString()}</td>
        <td class="${hl}">${r.decision}</td>
      </tr>
    `;
  }
  html += `</tbody></table></div>`;
  container.innerHTML = html;
}

function renderBestForBankroll(container, bankroll){
  const best = computeBestD();
  if (!best.res) {
    container.innerHTML = `<div class="placeholder" style="height:120px;">Could not compute the best EV — check payouts.</div>`;
    return;
  }
  const Dstar = best.D;
  const tpc = best.ticketsPerCoin ?? best.tpc;

  // Build suggestions across multiple fractions
  let html = `
    <div class="group">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <div>
          <div class="panel-title">Best EV for your bankroll</div>
          <div>Optimal Diamonds: <strong>D = ${Dstar}</strong> • Efficiency: <strong>${(tpc*100).toFixed(2)}</strong> tickets per 100 coins</div>
        </div>
        <div>
          <button class="btn btn-primary" id="dQuickApplyBest">Apply best for your bankroll</button>
        </div>
      </div>
      <div style="display:grid; gap:10px;">
  `;
  for (const s of BANKROLL_STEPS) {
    let suggested = Math.floor((bankroll * s.frac) / 1000) * 1000;
    suggested = Math.max(MIN_BET, Math.min(MAX_BET, suggested));
    const expTickets = Math.round(suggested * tpc);
    const rounds = Math.max(1, Math.floor(bankroll / suggested));
    html += `
      <div class="group" style="background:transparent; box-shadow:none; padding:0;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div><strong>${s.label}</strong></div>
          <div class="badge">Bet: ${suggested.toLocaleString()} coins</div>
        </div>
        <div style="margin-top:6px; font-size:14px;">
          Expected per round: <span class="num">${expTickets.toLocaleString()}</span> tickets
          • Approx rounds: <span class="num">${rounds.toLocaleString()}</span>
          • <button class="btn btn-primary" data-apply-d="${Dstar}" data-apply-w="${suggested}" style="margin-left:8px;">Apply</button>
        </div>
      </div>
    `;
  }
  html += `</div></div>`;
  container.innerHTML = html;

  // Header quick-apply (uses DEFAULT_BANKROLL_FRACTION)
  const quick = document.getElementById('dQuickApplyBest');
  quick?.addEventListener('click', applyBestForBankroll);
}

  function toCssHex(v){ return `#${hex6(v)}`; }
  function rgbDistSq(a,b){
    const ar=(a>>16)&255, ag=(a>>8)&255, ab=a&255;
    const br=(b>>16)&255, bg=(b>>8)&255, bb=b&255;
    const dr=ar-br, dg=ag-bg, db=ab-bb;
    return dr*dr + dg*dg + db*db;
  }
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function rgbToHue(color){
    const r = ((color>>16)&255)/255, g=((color>>8)&255)/255, b=(color&255)/255;
    const max = Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
    if (d === 0) return 0;
    let h;
    switch(max){
      case r: h = ((g - b) / d) % 6; break;
      case g: h = (b - r) / d + 2; break;
      default: h = (r - g) / d + 4; break;
    }
    h = Math.round(h*60);
    if (h < 0) h += 360;
    return h;
  }
  function hueDelta(a,b){
    const d = Math.abs(a-b);

  // Config (keys/masks removed from UI, kept internally)

  const config = JSON.parse(JSON.stringify(defaultConfig));

  function applyAggressivePreset(){
    config.modal.sampleGrid = 12;

    config.match.mode = 'hue';
