  }

  // Advanced/Controls UI bindings
  function syncAdvancedUI(){
    inpRevealEndSilence.value = String(config.revealEndSilenceMs);
    inpInputTimeout.value = String(config.inputTimeoutMs);
    chkDiagnostics.checked = !!config.diagnostics;
    selMatchMode.value = config.match.mode;
    inpTealTol.value = String(config.match.tolerance.teal);
    inpGreenTol.value = String(config.match.tolerance.green);
    inpMinSamplesFrac.value = String(config.minSamplesFraction);
  }
  inpRevealEndSilence.addEventListener('change', ()=>{ const v=+inpRevealEndSilence.value; if (Number.isFinite(v)) config.revealEndSilenceMs = Math.max(300, Math.min(2000, v)); });
  inpInputTimeout.addEventListener('change', ()=>{ const v=+inpInputTimeout.value; if (Number.isFinite(v)) config.inputTimeoutMs = Math.max(0, Math.min(3600000, v)); });
  chkDiagnostics.addEventListener('change', ()=>{ config.diagnostics = !!chkDiagnostics.checked; });
  selMatchMode.addEventListener('change', ()=>{ config.match.mode = selMatchMode.value; });
  inpTealTol.addEventListener('change', ()=>{ const v=+inpTealTol.value; if (Number.isFinite(v)) config.match.tolerance.teal = Math.max(0, Math.min(180, v)); });
  inpGreenTol.addEventListener('change', ()=>{ const v=+inpGreenTol.value; if (Number.isFinite(v)) config.match.tolerance.green = Math.max(0, Math.min(180, v)); });
  inpMinSamplesFrac.addEventListener('change', ()=>{ const v=+inpMinSamplesFrac.value; if (Number.isFinite(v)) config.minSamplesFraction = Math.max(0, Math.min(1, v)); });
  btnAggressive.addEventListener('click', (e)=>{ e.preventDefault(); applyAggressivePreset(); });
  btnRestoreDefaults.addEventListener('click', (e)=>{ e.preventDefault(); Object.assign(config, JSON.parse(JSON.stringify(defaultConfig))); syncAdvancedUI(); });

  // Difficulty/grid
  let difficulty='expert', rows=6, cols=6;
  function updateGridFromDifficulty(){
    switch(difficulty){
      case 'easy': rows=4; cols=4; break;
      case 'medium': rows=5; cols=5; break;
      case 'hard':
      case 'expert': rows=6; cols=6; break;
      default: rows=6; cols=6;
    }
  }

  // State
  let stream=null, running=false, detectionActive=false, hasBoard=false;
  let boardRect=null; // video-space
  let tileRects=[];

  // Diagnostics state
  let diag = { tiles: [], bestTealIdx:-1, bestGreenIdx:-1 };

  // VideoFrame reader
  class FrameReader {
    constructor(){
      this.buffer = new ArrayBuffer(0);
      this.u32 = new Uint32Array(this.buffer);
      this.w=0; this.h=0;
      this.supported = (typeof VideoFrame !== 'undefined');
    }
    copy(video, rect){
      if (!this.supported) throw new Error('VideoFrame not supported');
      const frame = new VideoFrame(video);
      if (rect.width !== this.w || rect.height !== this.h){
        this.w = rect.width|0; this.h = rect.height|0;
        this.buffer = new ArrayBuffer(this.w * this.h * 4);
        this.u32 = new Uint32Array(this.buffer);
      }
      frame.copyTo(this.buffer, { rect, format: 'RGBX' });
      frame.close();
    }
  }
  const fr = new FrameReader();

  // Sampling dominant masked color within a tile
  function modalTileColor(u32, w, t){
    const x0 = Math.max(0, (t.x - boardRect.x)|0);
    const y0 = Math.max(0, (t.y - boardRect.y)|0);
    const tw = Math.max(1, t.w|0), th = Math.max(1, t.h|0);
    const insetX = (tw*0.15)|0, insetY = (th*0.15)|0;
    const spanX = Math.max(1,(tw*0.70)|0), spanY = Math.max(1,(th*0.70)|0);
    const N = config.modal.sampleGrid|0;
    const total = N*N;
    const hist = new Map();
    let best = 0, bestCount = -1;
    for (let yi=0; yi<N; yi++){
      for (let xi=0; xi<N; xi++){
        const px = Math.min(fr.w-1, x0 + insetX + ((xi*spanX)/(N-1))|0);
        const py = Math.min(fr.h-1, y0 + insetY + ((yi*spanY)/(N-1))|0);
        const c = u32[px + py * w] & config.modal.dropMask;
        const v = (hist.get(c)||0)+1; hist.set(c, v);
        if (v > bestCount){ best = c; bestCount = v; }
      }
    }
    return { color: best, count: bestCount, total };
  }

  // Matching (RGB or Hue)
  function classifyTiles(){
    diag = { tiles: [], bestTealIdx:-1, bestGreenIdx:-1 };

    const minCount = Math.max(1, Math.floor(((config.modal.sampleGrid|0) ** 2) * (config.minSamplesFraction ?? 0.25)));
    const tealRefs  = (config.modal.tealKeys  || [config.modal.tealKey ]).map(k => (k & 0xffffff)>>>0);
    const greenRefs = (config.modal.greenKeys || [config.modal.greenKey]).map(k => (k & 0xffffff)>>>0);
    const tealHues  = tealRefs.map(rgbToHue);
    const greenHues = greenRefs.map(rgbToHue);

    let bestTealScore=Infinity, bestTealCount=0;
    let bestGreenScore=Infinity, bestGreenCount=0;

    for (let i=0;i<tileRects.length;i++){
      const t=tileRects[i];
      const { color, count, total } = modalTileColor(fr.u32, fr.w, t);
      const masked = color & 0xffffff;

      let scoreTeal = Infinity, scoreGreen=Infinity;
      if (count >= minCount){
        if (config.match.mode === 'rgb'){
          scoreTeal  = Math.min(...tealRefs.map(ref  => Math.sqrt(rgbDistSq(masked, ref))));
          scoreGreen = Math.min(...greenRefs.map(ref => Math.sqrt(rgbDistSq(masked, ref))));
        } else {
          const h = rgbToHue(masked);
          scoreTeal  = Math.min(...tealHues.map(th  => hueDelta(h, th)));
          scoreGreen = Math.min(...greenHues.map(gh => hueDelta(h, gh)));
        }
      }

      diag.tiles[i] = { masked, count, total, dTeal: scoreTeal, dGreen: scoreGreen };

      if (scoreTeal <= (config.match.tolerance.teal ?? 48)) {
        if (scoreTeal < bestTealScore || (scoreTeal === bestTealScore && count > bestTealCount)) {
          bestTealScore=scoreTeal; bestTealCount=count; diag.bestTealIdx=i;
        }
      }
      if (scoreGreen <= (config.match.tolerance.green ?? 36)) {
        if (scoreGreen < bestGreenScore || (scoreGreen === bestGreenScore && count > bestGreenCount)) {
          bestGreenScore=scoreGreen; bestGreenCount=count; diag.bestGreenIdx=i;
        }
      }
    }
    return { bestTealIdx: diag.bestTealIdx, bestGreenIdx: diag.bestGreenIdx };
  }

  // FSM / timers
  let phase='idle';
  let roundIndex=0;
  let revealSeq=[];
  let inputSeq=[];
  let revealLenExpected=0;

  let lastTealTs=0;
  let inputStartTs=0, rearmTs=0;

  // FPS
  let lastFPSTs=0, framesInBucket=0;

  // Editor: edit (default), draw (drag-to-draw)
  const editor = {
    mode:'idle', // 'idle' | 'edit' | 'draw'
    rect:null, activeHandle:null, start:{x:0,y:0}, rectStart:null, handleSize:12
  };
  const pointerState = { active:false, id:-1 };

  function updateStatus(){
    elPhase.textContent=phase;
    elRound.textContent=String(roundIndex+1);
  }

  function buildTilesFromSquare(bx,by,bw,bh){
    const stepX=bw/cols, stepY=bh/rows;
    const gap=0.12;
    const wTile=stepX*(1-gap), hTile=stepY*(1-gap);
    const gx=stepX-wTile, gy=stepY-hTile;
    const out=[]; let idx=0;
    for (let r=0;r<rows;r++){
      for (let c=0;c<cols;c++){
        const x=bx + c*stepX + gx*0.5;
        const y=by + r*stepY + gy*0.5;
        out.push({ x,y,w:wTile,h:hTile,row:r,col:c,index:idx++ });
      }
    }
    return out;
  }

  // Overlay sizing
  function updateOverlayBox(){
    const vW = video.videoWidth || 0;

    if (hasBoard && boardRect && vW && editor.mode === 'idle') {
      // Crop mode: canvas renders the board region; video collapses to 1px (keeps decoding)
      video.style.position = 'absolute';
      video.style.opacity = '0';
      video.style.width = '1px';
      video.style.height = '1px';
      overlay.style.position = 'relative';
      overlay.style.left = '';
      overlay.style.top = '';

      const p = previewWrap.getBoundingClientRect();
      const containerW = Math.max(1, p.width);

      // padding above board in video px, targeting ~100 screen px
      const padTopVid = Math.max(0, Math.round(100 * boardRect.w / containerW));
      const cropY = Math.max(0, boardRect.y - padTopVid);
      const cropH = boardRect.h + (boardRect.y - cropY);
      const scale = containerW / Math.max(1, boardRect.w);
      const destW = Math.max(1, Math.round(containerW));
      const destH = Math.max(1, Math.round(cropH * scale));

      overlay.style.width = destW + 'px';
      overlay.style.height = destH + 'px';
      if (overlay.width !== destW) overlay.width = destW;
      if (overlay.height !== destH) overlay.height = destH;
      return;
    }

    // Normal mode: restore video
    video.style.position = '';
    video.style.opacity = '';
    video.style.width = '';
    video.style.height = '';
    overlay.style.position = 'absolute';

    const v = video.getBoundingClientRect();
    const p = previewWrap.getBoundingClientRect();
    const left = (v.width>0 && v.height>0) ? v.left : p.left;
    const top  = (v.width>0 && v.height>0) ? v.top  : p.top;
    const width  = (v.width>0 && v.height>0) ? v.width  : p.width;
    const height = (v.width>0 && v.height>0) ? v.height : p.height;

    overlay.style.left = (left - p.left)+'px';
    overlay.style.top  = (top  - p.top )+'px';
    overlay.style.width = width+'px';
    overlay.style.height = height+'px';

    const w = Math.max(1, Math.round(width));
    const h = Math.max(1, Math.round(height));
    if (overlay.width !== w) overlay.width = w;
    if (overlay.height !== h) overlay.height = h;
  }
  function setOverlayPointer(on){
    overlay.classList.toggle('pe-auto', on);
    overlay.classList.toggle('pe-none', !on);
    overlay.style.pointerEvents = on ? 'auto' : 'none';
    overlay.style.cursor = on ? 'crosshair' : 'default';
  }

  // Keyboard nudge/resize in edit mode
  function onKeyDown(e){
    if (editor.mode !== 'edit' || !editor.rect) return;

    // If an input/select/textarea is focused, blur it so our keys work
    const tag = (document.activeElement?.tagName || '').toLowerCase();
    if (tag && (tag === 'input' || tag === 'select' || tag === 'textarea')) {
      if (document.activeElement !== overlay) document.activeElement.blur();
    }

    const step = e.shiftKey ? 5 : 1;
    let used=false;

    if (e.key === 'ArrowLeft'){ editor.rect.x = Math.max(0, editor.rect.x - step); used=true; }
    if (e.key === 'ArrowRight'){ editor.rect.x = Math.min(overlay.width - editor.rect.w, editor.rect.x + step); used=true; }
    if (e.key === 'ArrowUp'){ editor.rect.y = Math.max(0, editor.rect.y - step); used=true; }
    if (e.key === 'ArrowDown'){ editor.rect.y = Math.min(overlay.height - editor.rect.h, editor.rect.y + step); used=true; }

    if (e.key === '+' || e.key === '='){
      const grow = step;
      const newW = Math.min(overlay.width, editor.rect.w + grow);
      editor.rect.x = clamp(editor.rect.x - grow/2, 0, Math.max(0, overlay.width - newW));
      editor.rect.y = clamp(editor.rect.y - grow/2, 0, Math.max(0, overlay.height - newW));
      editor.rect.w = newW; editor.rect.h = newW; used=true;
    }
    if (e.key === '-'){
      const shrink = step;
      const newW = Math.max(20, editor.rect.w - shrink);
      editor.rect.x = clamp(editor.rect.x + shrink/2, 0, Math.max(0, overlay.width - newW));
      editor.rect.y = clamp(editor.rect.y + shrink/2, 0, Math.max(0, overlay.height - newW));
      editor.rect.w = newW; editor.rect.h = newW; used=true;
    }

    if (e.key === 'Enter'){
      commitEditorRectToBoard();
      editor.mode='idle';
      setOverlayPointer(false);
      btnDoneEdit.disabled=true;
      used=true;
    }

    if (used){ e.preventDefault(); drawOverlay(); }
  }
  window.addEventListener('keydown', onKeyDown);

  // Geometry helpers
  function squareFromRectCentered(r,maxW,maxH){
    const cx=r.x+r.w/2, cy=r.y+r.h/2, side=Math.min(Math.max(r.w,r.h), Math.min(maxW,maxH));
    let x=cx-side/2, y=cy-side/2; x=clamp(x,0,maxW-side); y=clamp(y,0,maxH-side);
    return {x,y,w:side,h:side};
  }
  function getHandleRects(r,hs){
    return [
      {name:'nw', x:r.x-hs/2, y:r.y-hs/2, w:hs, h:hs},
      {name:'ne', x:r.x+r.w-hs/2, y:r.y-hs/2, w:hs, h:hs},
      {name:'se', x:r.x+r.w-hs/2, y:r.y+r.h-hs/2, w:hs, h:hs},
      {name:'sw', x:r.x-hs/2, y:r.y+r.h-hs/2, w:hs, h:hs},
    ];
  }
  function hitTestHandle(x,y,r,hs){ for (const h of getHandleRects(r,hs)){ if (x>=h.x&&x<=h.x+h.w&&y>=h.y&&y<=h.y+h.h) return h.name; } return null; }
  function pointInRect(x,y,r){ return x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h; }
  function clampRect(x0,y0,dx,dy,maxW,maxH){
    const x1=clamp(x0+dx,0,maxW), y1=clamp(y0+dy,0,maxH);
    const x=clamp(Math.min(x0,x1),0,maxW), y=clamp(Math.min(y0,y1),0,maxH);
    const w=clamp(Math.abs(x1-x0),0,maxW-x), h=clamp(Math.abs(y1-y0),0,maxH-y);
    return {x,y,w,h};
  }
  function squareResizeFromCorner(startRect, handle, dx, dy, maxW, maxH){
    const minSide=20; let side=startRect.w, x=startRect.x, y=startRect.y;
    if (handle==='se'){ const desired=side+Math.max(dx,dy); const maxSide=Math.min(maxW-startRect.x, maxH-startRect.y); side=clamp(desired,minSide,maxSide); }
    else if (handle==='ne'){ const desired=side+Math.max(dx,-dy); const maxSide=Math.min(maxW-startRect.x, startRect.y+startRect.h); side=clamp(desired,minSide,maxSide); y=(startRect.y+startRect.h)-side; y=clamp(y,0,maxH-side); }
    else if (handle==='nw'){ const desired=side+Math.max(-dx,-dy); const maxSide=Math.min(startRect.x+startRect.w, startRect.y+startRect.h); side=clamp(desired,minSide,maxSide); x=(startRect.x+startRect.w)-side; y=(startRect.y+startRect.h)-side; x=clamp(x,0,maxW-side); y=clamp(y,0,maxH-side); }
    else if (handle==='sw'){ const desired=side+Math.max(-dx,dy); const maxSide=Math.min(startRect.x+startRect.w, maxH-startRect.y); side=clamp(desired,minSide,maxSide); x=(startRect.x+startRect.w)-side; x=clamp(x,0,maxW-side); }
    return {x,y,w:side,h:side};
  }
  function squareMove(startRect,dx,dy,maxW,maxH){
    const x=clamp(startRect.x+dx,0,maxW-startRect.w), y=clamp(startRect.y+dy,0,maxH-startRect.h);
    return {x,y,w:startRect.w,h:startRect.h};
  }
  function getOverlayXY(e){
    const cr = overlay.getBoundingClientRect();
    if (e.clientX != null && e.clientY != null) {
      return { x: e.clientX - cr.left, y: e.clientY - cr.top };
    }
    if (e.touches && e.touches[0]) {
      return { x: e.touches[0].clientX - cr.left, y: e.touches[0].clientY - cr.top };
    }
    if (e.changedTouches && e.changedTouches[0]) {
      return { x: e.changedTouches[0].clientX - cr.left, y: e.changedTouches[0].clientY - cr.top };
    }
    return { x: 0, y: 0 };
  }

  // Drawing helpers
  function drawGridAtRect(scrX, scrY, scrW, scrH){
    ctxOv.save();
    ctxOv.setLineDash([6,4]); ctxOv.lineWidth=2; ctxOv.strokeStyle='rgba(88,176,255,0.95)';
    ctxOv.strokeRect(scrX, scrY, scrW, scrH);
    ctxOv.restore();

    ctxOv.save();
    ctxOv.setLineDash([2,3]); ctxOv.lineWidth=1.25; ctxOv.strokeStyle='rgba(100,210,220,0.5)';
    const stepX = scrW/cols, stepY = scrH/rows;
    for (let c=1;c<cols;c++){ const xx = scrX + c*stepX; ctxOv.beginPath(); ctxOv.moveTo(xx, scrY); ctxOv.lineTo(xx, scrY+scrH); ctxOv.stroke(); }
    for (let r=1;r<rows;r++){ const yy = scrY + r*stepY; ctxOv.beginPath(); ctxOv.moveTo(scrX, yy); ctxOv.lineTo(scrX+scrW, yy); ctxOv.stroke(); }
    ctxOv.restore();
  }

  function drawTagBox(x,y,lines){
    const padX=8, padY=6, lh=14;
    const w = Math.max(...lines.map(s => ctxOv.measureText(s).width)) + padX*2;
    const h = lh*lines.length + padY*2;
    ctxOv.save();
    ctxOv.fillStyle = 'rgba(10,18,32,0.55)';
    ctxOv.strokeStyle = 'rgba(100,210,220,0.35)';
    ctxOv.lineWidth = 1.25;
    if (typeof ctxOv.roundRect === 'function') {
      ctxOv.beginPath();
      ctxOv.roundRect(x, y, w, h, 8);
      ctxOv.fill(); ctxOv.stroke();
    } else {
      ctxOv.fillRect(x, y, w, h);
      ctxOv.strokeRect(x, y, w, h);
    }
    ctxOv.fillStyle = '#c8eaf0';
    ctxOv.font = '12px ui-monospace, Menlo, Consolas, monospace';
    ctxOv.textBaseline = 'top';
    let yy = y + padY;
    for (const s of lines){ ctxOv.fillText(s, x + padX, yy); yy += lh; }
    ctxOv.restore();
  }

  function drawOverlay(){
    updateOverlayBox();
    const vw=overlay.width, vh=overlay.height;
    ctxOv.clearRect(0,0,vw,vh);

    const vW = video.videoWidth || 1;
    const vH = video.videoHeight || 1;
    const sx = vw / vW;
    const sy = vh / vH;

    // Crop mode: board is set and not being edited — render cropped board region
    if (hasBoard && boardRect && vW && editor.mode === 'idle') {
      const p = previewWrap.getBoundingClientRect();
      const containerW = Math.max(1, p.width);
      const padTopVid = Math.max(0, Math.round(100 * boardRect.w / containerW));
      const cropX = boardRect.x;
      const cropY = Math.max(0, boardRect.y - padTopVid);
      const cropW = boardRect.w;
      const cropH = boardRect.h + (boardRect.y - cropY);
      const boardYCanvas = Math.round((boardRect.y - cropY) * (vw / Math.max(1, cropW)));
      const bwc = vw;
      const bhc = vh - boardYCanvas;

      try {
        ctxOv.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, vw, vh);
      } catch(_) {}

      drawGridAtRect(0, boardYCanvas, bwc, bhc);

      const gap = 0.12;
      const stepX = bwc / cols, stepY = bhc / rows;
      const wTile = stepX*(1-gap), hTile = stepY*(1-gap);
      const gxInset = stepX-wTile, gyInset = stepY-hTile;

      if (phase==='waiting-input' && revealSeq.length>0){
        const k = inputSeq.length;
        const N = revealLenExpected || revealSeq.length;
        guideHeader.style.display='block';
        guideHeader.textContent = `Step ${Math.min(k+1,N)} / ${N}`;
        const now = performance.now(), pulse = 0.5 + 0.5*Math.sin(now/180);

        const currIdx = revealSeq[k] ?? null;
        if (currIdx != null){
          const r = Math.floor(currIdx/cols), c = currIdx%cols;
          ctxOv.lineWidth = 3 + 2*pulse;
          ctxOv.strokeStyle = `rgba(34,197,94,${0.55 + 0.35*pulse})`;
          ctxOv.shadowColor = 'rgba(34,197,94,0.35)'; ctxOv.shadowBlur = 10*pulse;
          ctxOv.strokeRect(c*stepX + gxInset*0.5, boardYCanvas + r*stepY + gyInset*0.5, wTile, hTile);
        }

        const nextIdx = revealSeq[k+1] ?? null;
        if (nextIdx != null){
          const r2 = Math.floor(nextIdx/cols), c2 = nextIdx%cols;
          ctxOv.lineWidth = 2.5 + 1.5*pulse;
          ctxOv.strokeStyle = `rgba(255,0,255,${0.45 + 0.35*pulse})`;
          ctxOv.shadowColor = 'rgba(255,0,255,0.25)'; ctxOv.shadowBlur = 8*pulse;
          ctxOv.strokeRect(c2*stepX + gxInset*0.5, boardYCanvas + r2*stepY + gyInset*0.5, wTile, hTile);
        }
      } else {
        guideHeader.style.display='none';
      }

      if (config.diagnostics && diag.tiles.length === tileRects.length){
        const sw = Math.max(4, Math.min(12, Math.round(stepX * 0.25)));
        for (let i=0;i<tileRects.length;i++){
          const dt = diag.tiles[i]; if (!dt) continue;
          const rr = Math.floor(i/cols), cc = i%cols;
          ctxOv.save();
          ctxOv.fillStyle = toCssHex(dt.masked);
          ctxOv.strokeStyle = 'rgba(0,0,0,0.6)';
          ctxOv.lineWidth = 1;
          ctxOv.fillRect(cc*stepX + stepX*0.5 - sw/2, boardYCanvas + rr*stepY + stepY*0.5 - sw/2, sw, sw);
          ctxOv.strokeRect(cc*stepX + stepX*0.5 - sw/2, boardYCanvas + rr*stepY + stepY*0.5 - sw/2, sw, sw);
          ctxOv.restore();
        }
      }

      return;
    }

    // Normal view
    if (boardRect && vW){
      const gx = boardRect.x * sx, gy = boardRect.y * sy, gw = boardRect.w * sx, gh = boardRect.h * sy;
      drawGridAtRect(gx, gy, gw, gh);
    } else if ((editor.mode === 'edit' || editor.mode === 'draw') && editor.rect){
      drawGridAtRect(editor.rect.x, editor.rect.y, editor.rect.w, editor.rect.h);
    }

    // Diagnostics in normal view
    if (config.diagnostics && boardRect && diag.tiles.length === tileRects.length){
      const gw = boardRect.w * sx, gh = boardRect.h * sy;
      const stepX = gw/cols, stepY = gh/rows;
      const sw = Math.max(4, Math.min(10, Math.round(stepX * 0.25)));
      for (let i=0;i<tileRects.length;i++){
        const r = Math.floor(i/cols), c = i%cols;
        const cx = (boardRect.x*sx) + c*stepX + stepX*0.5;
        const cy = (boardRect.y*sy) + r*stepY + stepY*0.5;
        const dt = diag.tiles[i]; if (!dt) continue;
        ctxOv.save();
        ctxOv.fillStyle = toCssHex(dt.masked);
        ctxOv.strokeStyle = 'rgba(0,0,0,0.6)';
        ctxOv.lineWidth = 1;
        ctxOv.fillRect(cx - sw/2, cy - sw/2, sw, sw);
        ctxOv.strokeRect(cx - sw/2, cy - sw/2, sw, sw);
        ctxOv.restore();
      }
    }

    // Guidance in normal view
    if (phase==='waiting-input' && revealSeq.length>0 && boardRect){
      const k = inputSeq.length;
      const N = revealLenExpected || revealSeq.length;
      guideHeader.style.display='block';
      guideHeader.textContent = `Step ${Math.min(k+1,N)} / ${N}`;

      const now = performance.now(), pulse = 0.5 + 0.5*Math.sin(now/180);

      const gap = 0.12;
      const stepX = (boardRect.w * sx)/cols, stepY = (boardRect.h * sy)/rows;
      const wTile = stepX*(1-gap), hTile = stepY*(1-gap);
      const gxInset=stepX-wTile, gyInset=stepY-hTile;

      const currIdx = revealSeq[k] ?? null;
      if (currIdx != null){
        const r = Math.floor(currIdx/cols), c = currIdx%cols;
        const x = (boardRect.x*sx) + c*stepX + gxInset*0.5;
        const y = (boardRect.y*sy) + r*stepY + gyInset*0.5;
        ctxOv.lineWidth = 3 + 2*pulse;
        ctxOv.strokeStyle = `rgba(34,197,94,${0.55 + 0.35*pulse})`;
        ctxOv.shadowColor = 'rgba(34,197,94,0.35)'; ctxOv.shadowBlur = 10*pulse;
        ctxOv.strokeRect(x,y,wTile,hTile);
      }

      const nextIdx = revealSeq[k+1] ?? null;
      if (nextIdx != null){
        const r2 = Math.floor(nextIdx/cols), c2 = nextIdx%cols;
        const x2 = (boardRect.x*sx) + c2*stepX + gxInset*0.5;
        const y2 = (boardRect.y*sy) + r2*stepY + gyInset*0.5;
        ctxOv.lineWidth = 2.5 + 1.5*pulse;
        ctxOv.strokeStyle = `rgba(255,0,255,${0.45 + 0.35*pulse})`;
        ctxOv.shadowColor = 'rgba(255,0,255,0.25)'; ctxOv.shadowBlur = 8*pulse;
        ctxOv.strokeRect(x2,y2,wTile,hTile);
      }
    } else {
      guideHeader.style.display='none';
    }
  }

  // Frame processing
  function processFrame(tsNow){
    if (!hasBoard || !detectionActive) return;
    if (!fr.supported) return;

    const rect = { x: boardRect.x|0, y: boardRect.y|0, width: boardRect.w|0, height: boardRect.h|0 };
    try { fr.copy(video, rect); } catch(_){ return; }

    const { bestTealIdx, bestGreenIdx } = classifyTiles();

    switch(phase){
      case 'idle': break;
      case 'armed':
        if (bestTealIdx >= 0){
          phase='reveal';
          revealSeq=[]; inputSeq=[]; revealLenExpected=0;
          lastTealTs = tsNow;
        }
        break;

      case 'reveal':
        if (bestTealIdx >= 0){
          lastTealTs = tsNow;
          const last = revealSeq[revealSeq.length-1];
          if (last == null || last !== bestTealIdx){
            revealSeq.push(bestTealIdx);
          }
        }
        if ((tsNow - lastTealTs) >= config.revealEndSilenceMs){
          if (revealSeq.length > 0){
            phase='waiting-input';
            inputSeq=[]; inputStartTs=tsNow;
            revealLenExpected = revealSeq.length;
          } else {
            phase='rearming'; rearmTs=tsNow;
          }
        }
        break;

      case 'waiting-input': {
        const expected = revealSeq[inputSeq.length] ?? -1;
        const hasTimeout = Number.isFinite(config.inputTimeoutMs) && config.inputTimeoutMs > 0;
        const inputElapsed = tsNow - inputStartTs;

        if (bestGreenIdx >= 0 && bestGreenIdx === expected){
          if (inputSeq[inputSeq.length-1] !== expected){
            inputSeq.push(expected);
            inputStartTs = tsNow;
          }
        }

        if (inputSeq.length >= revealLenExpected && revealLenExpected>0){
          roundIndex += 1;
          phase='rearming'; rearmTs=tsNow;
          revealSeq=[]; inputSeq=[]; revealLenExpected=0;
          guideHeader.style.display='none';
        } else if (hasTimeout && inputElapsed >= config.inputTimeoutMs){
          phase='rearming'; rearmTs=tsNow;
          revealSeq=[]; inputSeq=[]; revealLenExpected=0;
          guideHeader.style.display='none';
        }
        break;
      }

      case 'rearming':
        if (tsNow - rearmTs >= config.rearmDelayMs) phase='armed';
        break;
    }

    updateStatus();
  }

  // Diagnostics sampling even when detection is not running
  function sampleDiagnostics(){
    if (!config.diagnostics || !hasBoard || !fr.supported) return;
    const rect = { x: boardRect.x|0, y: boardRect.y|0, width: boardRect.w|0, height: boardRect.h|0 };
    try { fr.copy(video, rect); } catch(_){ return; }
    classifyTiles(); // fills 'diag'
  }

  // Pointer handlers (edit + draw)
  function onOverlayPointerDown(e){
    e.preventDefault();
    updateOverlayBox();
    requestAnimationFrame(updateOverlayBox);

    pointerState.active = true;
    pointerState.id = e.pointerId ?? -1;
    try{ overlay.setPointerCapture && overlay.setPointerCapture(e.pointerId); }catch(_){}
    overlay.focus();

    const { x, y } = getOverlayXY(e);
    editor.start = { x, y };

    if (editor.mode === 'edit'){
      const h = editor.rect ? hitTestHandle(x,y,editor.rect,editor.handleSize) : null;
      if (h){ editor.activeHandle = h; editor.rectStart = { ...editor.rect }; }
      else if (editor.rect && pointInRect(x,y,editor.rect)){ editor.activeHandle = 'move'; editor.rectStart = { ...editor.rect }; }
      else {
        // Click-and-drag to draw a new square
        editor.mode = 'draw';
        editor.rect = { x, y, w:0, h:0 };
      }
      drawOverlay();
      return;
    }

    if (editor.mode === 'draw'){
      editor.rect = { x, y, w:0, h:0 };
      drawOverlay();
    }
  }
  function onOverlayPointerMove(e){
    if (!pointerState.active) return;
    const { x, y } = getOverlayXY(e);
    const dx = x - editor.start.x, dy = y - editor.start.y;

    if (editor.mode === 'draw' && editor.rect){
      editor.rect = clampRect(editor.start.x, editor.start.y, dx, dy, overlay.width, overlay.height);
      drawOverlay();
      return;
    }

    if (editor.mode === 'edit' && editor.rect && editor.activeHandle){
      if (editor.activeHandle === 'move') editor.rect = squareMove(editor.rectStart, dx, dy, overlay.width, overlay.height);
      else editor.rect = squareResizeFromCorner(editor.rectStart, editor.activeHandle, dx, dy, overlay.width, overlay.height);
      drawOverlay();
    }
  }
  function onOverlayPointerUp(e){
    pointerState.active = false;
    try{ overlay.releasePointerCapture && overlay.releasePointerCapture(e.pointerId); }catch(_){}

    if (editor.mode === 'draw' && editor.rect){
      editor.rect = squareFromRectCentered(editor.rect, overlay.width, overlay.height);
      editor.mode = 'edit';
      btnDoneEdit.disabled = false;
      drawOverlay();
    } else if (editor.mode === 'edit'){
      editor.activeHandle = null;
    }
  }

  overlay.addEventListener('pointerdown', onOverlayPointerDown, { passive:false });
  overlay.addEventListener('pointermove', onOverlayPointerMove, { passive:false });
  overlay.addEventListener('pointerup', onOverlayPointerUp, { passive:true });
  overlay.addEventListener('pointercancel', onOverlayPointerUp, { passive:true });
  overlay.addEventListener('mousedown', ()=>{ overlay.focus(); }, { passive:true });
  window.addEventListener('mousemove', (e)=>{ if (pointerState.active && !('pointerId' in e)) onOverlayPointerMove(e); }, { passive:false });
  window.addEventListener('mouseup',   (e)=>{ if (pointerState.active && !('pointerId' in e)) onOverlayPointerUp(e); },   { passive:true });

  // Loops
  function uiLoop(){ if (!running) return; drawOverlay(); requestAnimationFrame(uiLoop); }
  function videoLoopVFC(now){
    if (!running) return;
    if (now-lastFPSTs>=1000){ elFPS.textContent=String(framesInBucket); framesInBucket=0; lastFPSTs=now; }
    framesInBucket++;
    sampleDiagnostics();
    if (detectionActive){ processFrame(now); }
    video.requestVideoFrameCallback(videoLoopVFC);
  }
  function videoLoopRaf(){
    if (!running) return;
    const tsNow=performance.now();
    if (tsNow-lastFPSTs>=1000){ elFPS.textContent=String(framesInBucket); framesInBucket=0; lastFPSTs=tsNow; }
    framesInBucket++;
    sampleDiagnostics();
    if (detectionActive){ processFrame(tsNow); }
    requestAnimationFrame(videoLoopRaf);
  }
  function startLoops(){
    lastFPSTs=performance.now(); framesInBucket=0;
    requestAnimationFrame(uiLoop);
    if (typeof video.requestVideoFrameCallback==='function'){ video.requestVideoFrameCallback(videoLoopVFC); }
    else { requestAnimationFrame(videoLoopRaf); }
  }

  // Capture
  async function startCapture(){
    try{
      const streamLocal = await navigator.mediaDevices.getDisplayMedia({
        video:{ displaySurface:'window', frameRate:{ideal:60,max:60}, cursor:'never' }, audio:false
      });
      video.srcObject = streamLocal;
      const track = streamLocal.getVideoTracks()[0];
      try{ await track.applyConstraints({ frameRate:{ideal:60,max:60} }); }catch(_){}
      try{ if ('contentHint' in track) track.contentHint='motion'; }catch(_){}
      stream = streamLocal;
      btnCapture.disabled=true; btnStopCapture.disabled=false;
      btnSetBoard.disabled=false;
      running=true; startLoops();
    }catch(e){
      console.error(e);
      alert('Screen/window capture was not granted.');
    }
  }
  function stopCapture(){
    if (stream){ stream.getTracks().forEach(t=>t.stop()); }
    stream=null; video.srcObject=null; running=false;
    btnCapture.disabled=false; btnStopCapture.disabled=true;
    btnSetBoard.disabled=true;
    resetDetectionState({clearBoard:true});
    drawOverlay();
  }

  // Detection state
  function resetDetectionState({clearBoard=true}={}){
    detectionActive=false; btnStart.disabled=!hasBoard; btnStop.disabled=true; btnResetRounds.disabled=true;
    phase='idle'; roundIndex=0; revealSeq=[]; inputSeq=[]; revealLenExpected=0;
    lastTealTs=0; inputStartTs=0; rearmTs=0;
    guideHeader.style.display='none'; guideHeader.textContent='';
    if (clearBoard){
      boardRect=null; tileRects=[]; hasBoard=false;
      btnDoneEdit.disabled=true; btnClearBoard.disabled=true; quickResizeGroup.style.display='none';
      Object.assign(editor,{mode:'idle',rect:null,activeHandle:null});
      setOverlayPointer(false);
    }
    updateStatus();
  }
  function resetRounds(){
    roundIndex=0; revealSeq=[]; inputSeq=[]; revealLenExpected=0;
    phase='armed';
    guideHeader.style.display='none'; guideHeader.textContent='';
    updateStatus();
  }

  function commitEditorRectToBoard(){
    if (!editor.rect || !(video.videoWidth && video.videoHeight)){
      alert('Video not ready yet. Start capture and wait a moment, then try again.');
      return;
    }
    const vw=overlay.width, vh=overlay.height, sx=(video.videoWidth||1)/vw, sy=(video.videoHeight||1)/vh;
    const r=editor.rect;
    boardRect={ x:r.x*sx, y:r.y*sy, w:r.w*sx, h:r.h*sy };
    tileRects = buildTilesFromSquare(boardRect.x,boardRect.y,boardRect.w,boardRect.h);
    hasBoard=true;
    btnClearBoard.disabled=false; btnStart.disabled=false; btnResetRounds.disabled=false;
  }

  // Controls
  btnCapture.addEventListener('click', startCapture);
  btnStopCapture.addEventListener('click', stopCapture);

  btnSetBoard.addEventListener('click', ()=>{
    if (!video.srcObject){ alert('Start capture first.'); return; }
    // Set edit mode first so updateOverlayBox exits crop mode and restores the video
    editor.mode='edit';
    updateOverlayBox();
    requestAnimationFrame(updateOverlayBox);
    setOverlayPointer(true);

    // If we already have a board, load it for editing; else drop a centered square
    if (hasBoard && boardRect && video.videoWidth && video.videoHeight){
      const vw=overlay.width, vh=overlay.height, sx=vw/(video.videoWidth||1), sy=vh/(video.videoHeight||1);
      editor.rect={ x:boardRect.x*sx, y:boardRect.y*sy, w:boardRect.w*sx, h:boardRect.h*sy };
    } else {
      const side = Math.round(Math.min(overlay.width, overlay.height) * 0.6);
      const x = Math.round((overlay.width - side)/2);
      const y = Math.round((overlay.height - side)/2);
      editor.rect = { x, y, w: side, h: side };
    }
    btnDoneEdit.disabled=false; quickResizeGroup.style.display='flex';
    if (document.activeElement && document.activeElement !== overlay) {
      try { document.activeElement.blur(); } catch {}
    }
    overlay.focus();
    drawOverlay();
  });

  btnDoneEdit.addEventListener('click', ()=>{
    if (editor.mode==='edit' && editor.rect){
      commitEditorRectToBoard();
      editor.mode='idle';
      setOverlayPointer(false);
      btnDoneEdit.disabled=true; quickResizeGroup.style.display='none';
      drawOverlay();
    }
  });

  btnClearBoard.addEventListener('click', ()=>{ resetDetectionState({clearBoard:true}); drawOverlay(); });

  function quickResizeBoard(delta) {
    if (!editor.rect) return;
    const newSide = Math.max(20, editor.rect.w + delta);
    editor.rect = {
      x: clamp(editor.rect.x + (editor.rect.w - newSide) / 2, 0, overlay.width - newSide),
      y: clamp(editor.rect.y + (editor.rect.h - newSide) / 2, 0, overlay.height - newSide),
      w: newSide, h: newSide
    };
    drawOverlay();
  }
  btnShrinkBoard.addEventListener('click', ()=> quickResizeBoard(-10));
  btnGrowBoard.addEventListener('click',   ()=> quickResizeBoard(+10));

  btnStart.addEventListener('click', ()=>{
    if (!stream){ alert('Start capture first.'); return; }
    if (!hasBoard){ alert('Set the board first.'); return; }
    if (!fr.supported){ alert('New engine requires VideoFrame support (Chromium/WebCodecs).'); return; }
    detectionActive=true; phase='armed';
    btnStart.disabled=true; btnStop.disabled=false; btnResetRounds.disabled=false;
    updateStatus();
  });
  btnStop.addEventListener('click', ()=>{ detectionActive=false; phase='idle'; btnStart.disabled=false; btnStop.disabled=true; updateStatus(); });
  btnResetRounds.addEventListener('click', ()=>{ resetRounds(); });

  selDifficulty.addEventListener('change', ()=>{
    difficulty=selDifficulty.value;
    updateGridFromDifficulty();
    if (hasBoard){
      tileRects = buildTilesFromSquare(boardRect.x,boardRect.y,boardRect.w,boardRect.h);
      resetDetectionState({clearBoard:false});
    }
    drawOverlay();
  });

  // Init
  updateGridFromDifficulty();
  syncAdvancedUI();
  resetDetectionState({clearBoard:true});

  // Sizing hooks
  window.addEventListener('resize', ()=>{ updateOverlayBox(); if (editor.mode !== 'idle') drawOverlay(); });
  video.addEventListener('loadedmetadata', ()=>{ updateOverlayBox(); if (editor.mode !== 'idle') drawOverlay(); });
  video.addEventListener('play', ()=>{ updateOverlayBox(); if (editor.mode !== 'idle') drawOverlay(); });
  try { new ResizeObserver(()=>{ updateOverlayBox(); if (editor.mode !== 'idle') drawOverlay(); }).observe(previewWrap); } catch {}

  // Start UI loop after capture begins
}

  initEngine();
}

function zenDestroy() {}

// Default export for router compatibility


// === main ===


const app = document.getElementById('app');
const toggle = document.getElementById('segmentedToggle');
const footerLinks = document.querySelectorAll('.footer [data-jump]');

const views = {
  grid:    { init: gridInit,    destroy: gridDestroy },
  sanctum: { init: sanctumInit, destroy: sanctumDestroy },
  diamond: { init: diamondInit, destroy: diamondDestroy },
  zen:     { init: zenInit,     destroy: zenDestroy },
};

let current = null;

function trackToolView(view){
  try { window.va && window.va('event', 'view_' + view); } catch {}
}

async function mount(mod, name) {
  const api = mod?.init ? mod : (mod?.default?.init ? mod.default : null);
  if (!api || typeof api.init !== 'function') {
    throw new Error('View "' + name + '" did not export init()');
  }
  if (current?.destroy) {
    try { current.destroy(); } catch (e) { console.warn('Destroy error:', e); }
  }
  current = { name, destroy: api.destroy || null };
  app.innerHTML = '';
  await api.init(app);
  setActiveView(name);
  [...toggle.querySelectorAll('.seg-btn')].forEach(b => {
    const active = b.dataset.view === name;
    b.classList.toggle('active', active);
    b.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
  app.style.minHeight = app.offsetHeight + 'px';
  trackToolView(name);
}

async function loadView(name){
  const mod = views[name];
  if (!mod) {
    app.innerHTML = '<section class="card"><div class="title">Error</div><div class="placeholder" style="height:200px;">Unknown view.</div></section>';
    return;
  }
  try {
    await mount(mod, name);
  } catch (err) {
    console.error('Failed to load view "' + name + '"', err);
    app.innerHTML = '<section class="card"><div class="title">Oops</div><div class="placeholder" style="height:200px;">Failed to load view.</div></section>';
  }
}

toggle.addEventListener('click', (e) => {
  const btn = e.target.closest('.seg-btn');
  if (!btn) return;
  e.preventDefault();
  loadView(btn.dataset.view);
});

footerLinks.forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    loadView(a.getAttribute('data-jump'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

loadView(getActiveView() || 'grid');

(function () {
    function updateEmbedZoom() {
        if (window.self !== window.top) {
            document.documentElement.style.zoom = screen.width <= 680 ? '0.70' : '';
        }
    }
    updateEmbedZoom();
    window.addEventListener('resize', updateEmbedZoom);
})();

  </script>
